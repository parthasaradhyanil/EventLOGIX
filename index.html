 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLOGIX</title>
    <style>
        /* --- 1. CSS STYLING --- */
        :root {
            --primary-color: #004d40;
            --secondary-color: #00796b;
            --accent-color: #ff9800;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        main {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* View Toggle Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--primary-color);
            background-color: transparent;
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active, .toggle-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Views Animation */
        #list-view, #calendar-view {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        #list-view.active, #calendar-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Layout for Event Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Event Card Styling */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }

        .card .club-name {
            font-style: italic;
            color: #666;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }

        .detail-row {
            display: flex;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .detail-row strong {
            width: 80px;
            color: #555;
        }

        /* Badges */
        .badges {
            margin: 1.5rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .bg-paid { background-color: #d32f2f; }
        .bg-free { background-color: #388e3c; }
        .bg-leave { background-color: #1976d2; }
        .bg-no-leave { background-color: #757575; }

        /* Google Form Link Button */
        .btn-register {
            margin-top: auto;
            display: block;
            padding: 0.8rem;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s;
        }

        .btn-register:hover {
            background-color: #e68a00;
        }

        /* Calendar View Styling */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            background: #ddd;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .calendar-day-header {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .calendar-day {
            background: white;
            min-height: 100px;
            padding: 0.5rem;
            position: relative;
        }

        .calendar-day.empty {
            background: #f9f9f9;
        }

        .day-number {
            font-weight: bold;
            color: #777;
            margin-bottom: 5px;
            display: block;
        }

        .calendar-event {
            background: var(--secondary-color);
            color: white;
            font-size: 0.75rem;
            padding: 4px;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .calendar-event.paid { background: #d32f2f; }
        .calendar-event:hover { opacity: 0.8; }

        /* Responsive Calendar for Mobile */
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: 1fr; }
            .calendar-day-header { display: none; }
            .calendar-day { min-height: auto; padding: 1rem; border-bottom: 1px solid #eee; }
            .calendar-day.empty { display: none; }
            .day-number { display: inline-block; width: 30px; }
            .calendar-event { white-space: normal; }
        }
    </style>
</head>
<body>

            <div class="calendar-grid" id="calendar-grid">

        // Global Variable for Calendar Month (Starts at April 2026)
        let currentDate = new Date(2026, 3, 1); 

        // View Switcher Logic (Uses localStorage for Caching)
        function switchView(view) {
            localStorage.setItem('preferredView', view);

            document.getElementById('list-view').classList.remove('active');
            document.getElementById('calendar-view').classList.remove('active');
            document.getElementById('btn-list').classList.remove('active');
            document.getElementById('btn-calendar').classList.remove('active');

            if(view === 'list') {
                document.getElementById('list-view').classList.add('active');
                document.getElementById('btn-list').classList.add('active');
            } else {
                document.getElementById('calendar-view').classList.add('active');
                document.getElementById('btn-calendar').classList.add('active');
                renderCalendar();
            }
        }

        // Render List View Cards
        function renderList() {
            const container = document.getElementById('event-container');
            container.innerHTML = ""; 

            // Sort events chronologically
            const sortedEvents = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));

            sortedEvents.forEach(event => {
                const costClass = event.isFree ? "bg-free" : "bg-paid";
                const leaveBadge = event.dutyLeave 
                    ? `<span class="badge bg-leave">Duty Leave: Provided</span>` 
                    : `<span class="badge bg-no-leave">Duty Leave: None</span>`;

                const dateObj = new Date(event.date);
                const formattedDate = dateObj.toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

                const cardHTML = `
                    <div class="card">
                        <h3>${event.title}</h3>
                        <p class="club-name">Organized by: ${event.club}</p>
                        
                        <div class="detail-row">
                            <strong>Date:</strong> <span>${formattedDate}</span>
                        </div>
                        <div class="detail-row">
                            <strong>Venue:</strong> <span>${event.location}</span>
                        </div>
                        
                        <div class="badges">
                            <span class="badge ${costClass}">${event.costText}</span>
                            ${leaveBadge}
                        </div>

                        <a href="${event.formLink}" target="_blank" class="btn-register">Register via Google Form</a>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Calendar Logic
        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function renderCalendar() {
            const monthYear = document.getElementById('calendar-month-year');
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthYear.textContent = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                grid.innerHTML += `<div class="calendar-day-header">${day}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-day empty"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const daysEvents = events.filter(e => e.date === dateString);
                
                let eventsHTML = "";
                daysEvents.forEach(e => {
                    const eventClass = e.isFree ? '' : 'paid';
                    // The event block is now an interactive anchor tag!
                    eventsHTML += `<a href="${e.formLink}" target="_blank" class="calendar-event ${eventClass}" style="display: block; text-decoration: none;" title="Click to register for ${e.title} at ${e.location}">${e.title}</a>`;
                });

                grid.innerHTML += `
                    <div class="calendar-day">
                        <span class="day-number">${day}</span>
                        ${eventsHTML}
                    </div>
                `;
            }
        }

        // Initialize App on Window Load
        window.onload = () => {
            renderList(); 
            
            // Check localStorage cache for user's previous view
            const savedPreference = localStorage.getItem('preferredView');
            if (savedPreference) {
                switchView(savedPreference);
            } else {
                switchView('list'); 
            }
        };
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLOGIX | CET Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>EventLOGIX</h1>
    <p>CET Campus Event Portal</p>
</header>

<main>
    <div class="controls">
        <button id="btn-list" class="toggle-btn active" onclick="switchView('list')">List View</button>
        <button id="btn-calendar" class="toggle-btn" onclick="switchView('calendar')">Calendar View</button>
    </div>

    <div id="list-view" class="active">
        <div id="event-container" class="event-grid"></div>
    </div>

    <div id="calendar-view">
        <div class="cal-wrapper">
            <div class="cal-nav">
                <button class="toggle-btn" onclick="changeMonth(-1)">Prev</button>
                <h3 id="cal-label"></h3>
                <button class="toggle-btn" onclick="changeMonth(1)">Next</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
